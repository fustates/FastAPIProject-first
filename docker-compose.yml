version: "3.8"

services:
  fastapi:
    image: ${DEPLOY_IMAGE} # 对应 Jenkins 传入的环境变量
    container_name: ${DEPLOY_CONTAINER}
    restart: always
    networks:
      - web-gateway
    # 核心：滚动更新配置
    deploy:
      update_config:
        order: start-first # 重要：先启动新容器，健康后再停止旧容器
        delay: 5s # 给新容器 5 秒的初始缓冲时间
        failure_action: rollback
    # 核心：健康检查（没有这个，Docker 无法判断新容器是否真的 Ready）
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 未来你可以直接在这里平滑加入 pgsql 和 redis
  # db:
  #   image: postgres:15-alpine
  #   volumes:
  #     - ./pgdata:/var/lib/postgresql/data

networks:
  web-gateway:
    external: true # 使用已有的外部 Caddy 网络
